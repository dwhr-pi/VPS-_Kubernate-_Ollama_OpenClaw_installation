name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          find . -type f \( -name "*.sh" -o -name "setup_ultimate.sh" -o -name "setup_ultimate_v7.sh" -o -name "install.sh" \) -print0 \
            | xargs -0 -r shellcheck
