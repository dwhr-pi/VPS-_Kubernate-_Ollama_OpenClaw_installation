name: Repo Health

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install QA tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt python3
          npm install -g markdown-link-check

      - name: Validate JSON-compatible config
        run: bash scripts/validate_config.sh

      - name: Registry sync
        run: bash scripts/check_profile_registry_sync.sh

      - name: Shell syntax
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -n 1 bash -n
          bash -n install.sh
          bash -n setup_ultimate.sh

      - name: ShellCheck
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 shellcheck -x
          shellcheck -x install.sh setup_ultimate.sh

      - name: shfmt check
        run: |
          shfmt -d scripts install.sh setup_ultimate.sh

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Markdown link check
        run: |
          markdown-link-check readme.md
          find docs -name '*.md' -print0 | xargs -0 -n 1 markdown-link-check
