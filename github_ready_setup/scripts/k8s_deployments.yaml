apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama
      volumes:
      - name: ollama-models
        persistentVolumeClaim:
          claimName: ollama-pvc
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenbot
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zenbot
  template:
    metadata:
      labels:
        app: zenbot
    spec:
      containers:
      - name: zenbot
        image: deviavir/zenbot:latest
        env:
        - name: MONGODB_URI
          value: "mongodb://mongo:27017/zenbot"
        ports:
        - containerPort: 8080
---

apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: ai-services
spec:
  selector:
    app: mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:latest
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
      volumes:
      - name: mongo-data
        persistentVolumeClaim:
          claimName: mongo-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmanus
  labels:
    app: openmanus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openmanus
  template:
    metadata:
      labels:
        app: openmanus
    spec:
      initContainers:
      - name: git-clone-openmanus
        image: alpine/git
        command: ["git", "clone", "https://github.com/openmanus/openmanus.git", "/openmanus-src"]
        volumeMounts:
        - name: openmanus-volume
          mountPath: /openmanus-src
      containers:
      - name: openmanus
        image: python:3.9-slim # Beispiel Python Image
        command: ["python", "/openmanus-src/main.py"] # Annahme: main.py ist der Startpunkt
        ports:
        - containerPort: 8000 # Beispiel Port
        volumeMounts:
        - name: openmanus-volume
          mountPath: /openmanus-src
      volumes:
      - name: openmanus-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openmanus-service
spec:
  selector:
    app: openmanus
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP # Interner Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-ollama-proxy
  labels:
    app: gemini-ollama-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemini-ollama-proxy
  template:
    metadata:
      labels:
        app: gemini-ollama-proxy
    spec:
      containers:
      - name: proxy
        image: python:3.9-slim # Oder ein benutzerdefiniertes Proxy-Image
        command: ["python", "/app/proxy.py"]
        ports:
        - containerPort: 8000
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-secrets
              key: api-key
        - name: OLLAMA_URL
          value: "http://<MINIPC_PRIVATE_IP>:11434" # Muss angepasst werden
        volumeMounts:
        - name: proxy-code
          mountPath: /app
      volumes:
      - name: proxy-code
        configMap:
          name: gemini-ollama-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: gemini-ollama-proxy-service
spec:
  selector:
    app: gemini-ollama-proxy
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gemini-ollama-proxy-config
data:
  proxy.py: |
    import os
    import requests
    from flask import Flask, request, jsonify

    app = Flask(__name__)

    GEMINI_API_KEY = os.getenv("GEMINI_API_KEY")
    OLLAMA_URL = os.getenv("OLLAMA_URL")
    GEMINI_MODEL = "gemini-1.5-flash"

    @app.route("/generate", methods=["POST"])
    def generate():
        prompt = request.json.get("prompt")
        if not prompt:
            return jsonify({"error": "No prompt provided"}), 400

        try:
            # Versuch, Gemini zu nutzen
            gemini_headers = {"Content-Type": "application/json"}
            gemini_payload = {"contents": [{"parts": [{"text": prompt}]}]}
            gemini_response = requests.post(
                f"https://generativelanguage.googleapis.com/v1beta/models/{GEMINI_MODEL}:generateContent?key={GEMINI_API_KEY}",
                headers=gemini_headers,
                json=gemini_payload,
                timeout=10
            )
            gemini_response.raise_for_status()
            gemini_data = gemini_response.json()
            if gemini_data and "candidates" in gemini_data and gemini_data["candidates"]:
                return jsonify({"text": gemini_data["candidates"][0]["content"]["parts"][0]["text"]})

        except (requests.exceptions.RequestException, KeyError) as e:
            print(f"Gemini-Anfrage fehlgeschlagen oder Limit erreicht: {e}. Versuche Ollama...")
            # Fallback auf Ollama
            if OLLAMA_URL:
                try:
                    ollama_payload = {"model": "llama3.2:1b", "prompt": prompt}
                    ollama_response = requests.post(f"{OLLAMA_URL}/api/generate", json=ollama_payload, timeout=30)
                    ollama_response.raise_for_status()
                    ollama_data = ollama_response.json()
                    return jsonify({"text": ollama_data["response"]})
                except requests.exceptions.RequestException as e_ollama:
                    print(f"Ollama-Anfrage fehlgeschlagen: {e_ollama}")
                    return jsonify({"error": "Beide LLM-Anbieter sind nicht erreichbar."}), 500
            else:
                return jsonify({"error": "Gemini fehlgeschlagen und Ollama-URL nicht konfiguriert."}), 500

        return jsonify({"error": "Unbekannter Fehler bei der LLM-Generierung."}), 500

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=8000)
