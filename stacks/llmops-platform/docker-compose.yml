services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: llmops-litellm
    restart: unless-stopped
    env_file:
      - .env.example
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    ports:
      - "4000:4000"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: llmops-open-webui
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_API_BASE}
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
    volumes:
      - ./data/open-webui:/app/backend/data
    depends_on:
      - litellm
    ports:
      - "${OPENWEBUI_PORT}:8080"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: llmops-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "${QDRANT_PORT}:6333"

  postgres:
    image: postgres:16
    container_name: llmops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: llmops-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"

  minio:
    image: quay.io/minio/minio:latest
    container_name: llmops-minio
    restart: unless-stopped
    env_file:
      - .env.example
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: llmops-langfuse
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      NEXTAUTH_URL: ${LANGFUSE_HOST}
      TELEMETRY_ENABLED: "false"
    depends_on:
      - postgres
    ports:
      - "3003:3000"

  prometheus:
    image: prom/prometheus:latest
    container_name: llmops-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: llmops-grafana
    restart: unless-stopped
    volumes:
      - ./data/grafana:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"

  loki:
    image: grafana/loki:latest
    container_name: llmops-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT}:3100"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: llmops-uptime-kuma
    restart: unless-stopped
    volumes:
      - ./data/uptime-kuma:/app/data
    ports:
      - "${UPTIME_KUMA_PORT}:3001"

  netdata:
    image: netdata/netdata:latest
    container_name: llmops-netdata
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
    ports:
      - "${NETDATA_PORT}:19999"
